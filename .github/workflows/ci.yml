name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/loomcycle ./cmd/loomcycle

      - name: Test (race detector)
        # 120s is per-package. As the codebase grew (A2A added four more
        # race-instrumented test packages), `go test -race ./...` runs more
        # package binaries concurrently, and on a CPU-constrained CI runner
        # that contention pushed the slow internal/api/http suite (~68s on a
        # fast local box) past the 120s deadline despite no change to that
        # package. 300s gives headroom under load while still catching a
        # genuine deadlock.
        run: go test -race -timeout 300s ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  ts-adapter:
    name: TypeScript adapter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: adapters/ts/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  web-ui:
    name: Web UI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
