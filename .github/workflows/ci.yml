name: CI

on:
  push:
    branches: [main]
  pull_request:

# Run JavaScript-based actions (checkout, setup-go, setup-node, …) on
# Node.js 24. GitHub forces this default on 2026-06-16 and removes Node 20
# from runners on 2026-09-16; this opt-in clears the Node-20 deprecation
# warning now, across every action, without per-action major-version bumps.
# Safe to delete once Node 24 is the runner default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  go:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/loomcycle ./cmd/loomcycle

      - name: Test (race detector)
        # 120s is per-package. As the codebase grew (A2A added four more
        # race-instrumented test packages), `go test -race ./...` runs more
        # package binaries concurrently, and on a CPU-constrained CI runner
        # that contention pushed the slow internal/api/http suite (~68s on a
        # fast local box) past the 120s deadline despite no change to that
        # package. 300s gives headroom under load while still catching a
        # genuine deadlock.
        run: go test -race -timeout 300s ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  go-postgres:
    name: Go (Postgres store contract)
    runs-on: ubuntu-latest
    # Runs the shared storetest contract against a REAL Postgres so
    # backend-parity bugs are caught in CI, not only on SQLite. The contract
    # skips the PG path unless LOOMCYCLE_TEST_PG_DSN is set, so before this job
    # the production backend went untested — which hid the operator-token
    # nullable-column NULL-scan bug (admin-minted tokens fail-closed 401 on PG)
    # and a jsonb re-serialization brittleness. Postgres is what ships; CI must
    # exercise it.
    services:
      postgres:
        # pgvector image (postgres 16 + pgvector) so the SQL Memory vector-column
        # tests (Phase 3c) run on real pgvector, not only the base store contract.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: loomcycle
          POSTGRES_PASSWORD: loomcycle
          POSTGRES_DB: loomcycle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loomcycle -d loomcycle_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Postgres store contract
        env:
          LOOMCYCLE_TEST_PG_DSN: postgres://loomcycle:loomcycle@127.0.0.1:5432/loomcycle_test?sslmode=disable
        run: go test -count=1 ./internal/store/...

      # RFC AA SQL Memory postgres tier: provision a SEPARATE aux DB reached by a
      # NON-superuser CREATEROLE admin (exactly the production provisioning), so
      # CI exercises the per-scope-login-role isolation tests (incl. the
      # cross-scope SET-role pivot regression) — not only SQLite. Without this
      # the postgres sqlmem tests skip.
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Provision sqlmem aux DB + admin role
        env:
          PGPASSWORD: loomcycle
        run: |
          psql -h 127.0.0.1 -U loomcycle -d loomcycle_test -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE sqlmem_admin LOGIN PASSWORD 'auxpw' CREATEROLE;" \
            -c "CREATE DATABASE sqlmem_aux OWNER sqlmem_admin;"
          # Phase 3c vector columns: install pgvector into a dedicated read-only
          # sqlmem_ext schema (the operator step) so the vector tests exercise it.
          psql -h 127.0.0.1 -U loomcycle -d sqlmem_aux -v ON_ERROR_STOP=1 \
            -c "CREATE SCHEMA sqlmem_ext;" \
            -c "CREATE EXTENSION vector SCHEMA sqlmem_ext;" \
            -c "GRANT USAGE ON SCHEMA sqlmem_ext TO PUBLIC;"
      - name: SQL Memory postgres tier
        env:
          LOOMCYCLE_TEST_SQLMEM_PG_DSN: postgres://sqlmem_admin:auxpw@127.0.0.1:5432/sqlmem_aux?sslmode=disable
        run: |
          go test -count=1 -race ./internal/sqlmem/...
          # The {"$embed"} round-trip lives in the Memory tool package; run the
          # vector tests there too (they skip without the aux DSN).
          go test -count=1 -run 'TestEmbedDirective|TestEncodePgvector|TestResolveEmbedArgs|TestMemorySQL_EmbedDirective|TestDocument_Postgres' ./internal/tools/builtin/...

  runtime-codejs:
    name: Runtime suites (code-js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      # The FUNCTIONAL code-js runtime suite is deterministic (synthetic
      # provider, no LLM / key / Postgres) and asserts storage state via the
      # sqlite3 CLI + parses SSE with python3. Both are preinstalled on
      # ubuntu-latest; this makes the dependency explicit and fails fast if the
      # image changes. NOTE: the STRESS suite (`make runtime-stress`) and the
      # soak/load suites are intentionally NOT run here — load, stress, and
      # sustainability tests run on the operator's machine, not in CI.
      - name: Ensure sqlite3 + python3
        run: |
          command -v python3 >/dev/null || { echo "python3 missing"; exit 1; }
          command -v sqlite3  >/dev/null || sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Runtime code-js suite (functional only)
        run: make runtime-codejs

  ts-adapter:
    name: TypeScript adapter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: adapters/ts/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  web-ui:
    name: Web UI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  python-adapter:
    name: Python adapter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q
