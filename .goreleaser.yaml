# goreleaser config — cross-platform release + Homebrew tap update.
#
# Triggered by .github/workflows/release.yml on `v*` tag push. Builds
# loomcycle for darwin-{arm64,amd64} + linux-{arm64,amd64}, packages
# each as tar.gz with LICENSE + README, attaches everything to the
# GitHub release at the tag, generates SHA256SUMS, then bumps
# Formula/loomcycle.rb in denn-gubsky/homebrew-loomcycle with the new
# version + per-platform sha256 values.
#
# The Web UI is built once before the goreleaser run (the workflow's
# `make build-ui` step) so internal/webui/dist/ is populated for
# go:embed across every cross-compiled binary.
#
# https://goreleaser.com/
version: 2

project_name: loomcycle

builds:
  - id: loomcycle
    main: ./cmd/loomcycle
    binary: loomcycle
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # -s -w strips DWARF + symbol table (~30% smaller). buildVersion /
    # buildCommit / buildTime are read by cmd/loomcycle/main.go via
    # the auto-version fallback chain (runtime/debug VCS stamp first;
    # these ldflags override when the operator runs `make build` from
    # a clean tag, which goreleaser always does).
    ldflags:
      - -s
      - -w
      - -X main.buildVersion={{ .Version }}
      - -X main.buildCommit={{ .ShortCommit }}
      - -X main.buildTime={{ .CommitDate }}
    # Reproducible: pin mod_timestamp so multi-platform builds at the
    # same tag produce identical archives (only the embedded binary
    # differs by architecture).
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: loomcycle-binary
    ids:
      - loomcycle
    # Naming mirrors what the Formula's url template expects.
    # Lowercase OS/Arch so darwin-arm64 etc. match.
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

# Snapshot mode is what `goreleaser release --snapshot` uses to test
# the config locally without pushing anywhere. The tag template
# emits {next-tag}-next + commit so local snapshot artifacts can't
# be confused with real releases.
snapshot:
  version_template: "{{ incpatch .Version }}-next-{{ .ShortCommit }}"

# Release notes are managed manually on the GitHub release page
# (curated narrative). goreleaser's auto-changelog would produce a
# raw git-log dump that adds noise on top of the hand-written notes.
changelog:
  disable: true

release:
  github:
    owner: denn-gubsky
    name: loomcycle
  # Don't overwrite manually-curated release notes if the release
  # was created ahead of time (the v0.8.20 release was; future tags
  # might be too).
  mode: keep-existing

# Homebrew formula — generated AND pushed to the tap repo on each
# tag. `directory: Formula` matches the tap's layout. The token used
# to push is HOMEBREW_TAP_GITHUB_TOKEN (a separate fine-grained PAT
# scoped to denn-gubsky/homebrew-loomcycle with `contents: write`);
# the default GITHUB_TOKEN is scoped to this repo only and can't
# write to the tap.
brews:
  - name: loomcycle
    repository:
      owner: denn-gubsky
      name: homebrew-loomcycle
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/denn-gubsky/loomcycle"
    description: "Agentic runtime — one Go binary owning the LLM tool-use loop"
    license: "Apache-2.0"
    # commit_author surfaces in the tap's git history.
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "loomcycle {{ .Tag }} — formula bump"
    # caveats prints on `brew install` — mirrors what we wrote
    # by hand for v0.8.20.
    caveats: |
      Quick start (v0.11.1+):

        loomcycle init       # bootstrap ~/.config/loomcycle/loomcycle.yaml
        # set $LOOMCYCLE_AUTH_TOKEN and at least one provider key
        # (ANTHROPIC_API_KEY / OPENAI_API_KEY / DEEPSEEK_API_KEY)
        loomcycle doctor     # verify your setup
        loomcycle            # start the server on 127.0.0.1:8787

      For background-service operation on macOS, see Homebrew's
      `brew services`. For Docker-based deployment, pull from
      docker.io/denngubsky/loomcycle (v0.11.2+).
    test: |
      assert_match "version=", shell_output("#{bin}/loomcycle --version")

# Docker images — multi-arch (linux/amd64 + linux/arm64), published to
# Docker Hub at docker.io/denngubsky/loomcycle. The release.yml
# workflow logs into Docker Hub before invoking goreleaser; when the
# DOCKER_USERNAME secret is absent (operator hasn't set up the access
# token yet), the docker-login step in release.yml short-circuits and
# the goreleaser run skips the dockers stage via `--skip docker`.
# Once the secret is configured, the same pipeline pushes without
# further config changes.
#
# Note on registry naming: Docker Hub strips hyphens from usernames.
# `denn-gubsky` on GitHub becomes `denngubsky` on Docker Hub.
#
# Uses Dockerfile.release (the goreleaser-specific variant that copies
# the already-built binary in instead of running the multi-stage build
# from scratch — goreleaser pre-builds every arch in its `builds:`
# stage and we'd waste minutes re-running go build inside Docker).
dockers:
  - id: loomcycle-amd64
    ids:
      - loomcycle
    image_templates:
      - "denngubsky/loomcycle:{{ .Version }}-amd64"
      - "denngubsky/loomcycle:latest-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=loomcycle"
      - "--label=org.opencontainers.image.description=Agentic runtime — one Go binary owning the LLM tool-use loop"
      - "--label=org.opencontainers.image.url=https://github.com/denn-gubsky/loomcycle"
      - "--label=org.opencontainers.image.source=https://github.com/denn-gubsky/loomcycle"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
    goarch: amd64
  - id: loomcycle-arm64
    ids:
      - loomcycle
    image_templates:
      - "denngubsky/loomcycle:{{ .Version }}-arm64"
      - "denngubsky/loomcycle:latest-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=loomcycle"
      - "--label=org.opencontainers.image.description=Agentic runtime — one Go binary owning the LLM tool-use loop"
      - "--label=org.opencontainers.image.url=https://github.com/denn-gubsky/loomcycle"
      - "--label=org.opencontainers.image.source=https://github.com/denn-gubsky/loomcycle"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
    goarch: arm64

  # loomcycle-toolbox — the SAME binary on a non-distroless Debian base with a
  # dev toolchain (Python/Go/Rust/C++/Node + git/gh/curl) so agents can run
  # scripts + compile/test code via Bash / Bashbox fallback. Weak isolation
  # (code runs in loomcycle's own container) — single-tenant/trusted only; see
  # Dockerfile.toolbox + docs/TOOLBOX_IMAGE.md. Reuses the same pre-built
  # `loomcycle` binary (ids: [loomcycle]) — only the runtime base differs.
  #
  # NOTE: the toolbox layers run apt-get + toolchain downloads, so the arm64
  # build executes under QEMU emulation on the amd64 release runner and is
  # SLOW (tens of minutes) vs the trivial distroless COPY. Watch the release
  # job's duration; if it times out, drop the -arm64 block + its manifest arm64
  # entry to ship amd64-only until a native arm64 runner is available.
  - id: loomcycle-toolbox-amd64
    ids:
      - loomcycle
    image_templates:
      - "denngubsky/loomcycle-toolbox:{{ .Version }}-amd64"
      - "denngubsky/loomcycle-toolbox:latest-amd64"
    dockerfile: Dockerfile.toolbox
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=loomcycle-toolbox"
      - "--label=org.opencontainers.image.description=loomcycle + a developer toolchain (Python/Go/Rust/C++/Node) for single-tenant code execution"
      - "--label=org.opencontainers.image.url=https://github.com/denn-gubsky/loomcycle"
      - "--label=org.opencontainers.image.source=https://github.com/denn-gubsky/loomcycle"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
    goarch: amd64
  - id: loomcycle-toolbox-arm64
    ids:
      - loomcycle
    image_templates:
      - "denngubsky/loomcycle-toolbox:{{ .Version }}-arm64"
      - "denngubsky/loomcycle-toolbox:latest-arm64"
    dockerfile: Dockerfile.toolbox
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=loomcycle-toolbox"
      - "--label=org.opencontainers.image.description=loomcycle + a developer toolchain (Python/Go/Rust/C++/Node) for single-tenant code execution"
      - "--label=org.opencontainers.image.url=https://github.com/denn-gubsky/loomcycle"
      - "--label=org.opencontainers.image.source=https://github.com/denn-gubsky/loomcycle"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
    goarch: arm64

# docker_manifests joins per-arch images into one multi-arch manifest
# the operator pulls with `docker pull denngubsky/loomcycle:vX.Y.Z`
# regardless of their host arch.
docker_manifests:
  - name_template: "denngubsky/loomcycle:{{ .Version }}"
    image_templates:
      - "denngubsky/loomcycle:{{ .Version }}-amd64"
      - "denngubsky/loomcycle:{{ .Version }}-arm64"
  - name_template: "denngubsky/loomcycle:latest"
    image_templates:
      - "denngubsky/loomcycle:latest-amd64"
      - "denngubsky/loomcycle:latest-arm64"
  - name_template: "denngubsky/loomcycle-toolbox:{{ .Version }}"
    image_templates:
      - "denngubsky/loomcycle-toolbox:{{ .Version }}-amd64"
      - "denngubsky/loomcycle-toolbox:{{ .Version }}-arm64"
  - name_template: "denngubsky/loomcycle-toolbox:latest"
    image_templates:
      - "denngubsky/loomcycle-toolbox:latest-amd64"
      - "denngubsky/loomcycle-toolbox:latest-arm64"
