# loomcycle install/edit dialog (RFC AR). The provider/tier matrix comes from the
# binary's EMBEDDED presets (RFC AQ) — this form only collects the thin,
# deployment-specific overlay: which presets, the secrets, the Postgres DSNs, a
# few runtime knobs, the port, and the dataset mounts.
groups:
  - name: Providers & Presets
    description: Pick the embedded provider/tier presets and built-in agents.
  - name: Secrets
    description: Bearer token, pepper, and provider API keys (masked, env-only).
  - name: Storage (Postgres)
    description: Your existing Postgres (v14 or newer) — loomcycle bundles no database.
  - name: Runtime Options
    description: Non-secret operational config.
  - name: Network
    description: The HTTP+SSE / Web UI port.
  - name: Storage (Datasets)
    description: ZFS datasets for loomcycle's data, the config overlay, and agent Volumes.
  - name: Advanced configuration
    description: Every other non-secret knob from the env catalogue — leave blank for the binary default. Generated by `loomcycle truenas-questions`.

questions:
  # ── Providers & Presets ───────────────────────────────────────────────────
  - variable: presets
    label: Config presets
    description: |
      Embedded presets/bundles layered as the config base (LOOMCYCLE_PRESETS).
      `base` is the full provider matrix; `oauth`/`local` prepend a provider on
      top; `document-agent` registers the Document Assistant (needs SQL Memory).
    group: Providers & Presets
    schema:
      type: list
      default:
        - base
      items:
        - variable: preset
          label: Preset
          schema:
            type: string
            required: true
            enum:
              - value: base
                description: base — all providers + tiers (the base matrix)
              - value: oauth
                description: oauth — Anthropic OAuth-dev on top (needs base)
              - value: local
                description: local — Ollama-local on top (needs base)
              - value: document-agent
                description: document-agent — the Document Assistant (needs SQL Memory)

  # ── Secrets (private: UI-masked; written to container env, never a yaml layer) ─
  - variable: auth_token
    label: Auth token (LOOMCYCLE_AUTH_TOKEN)
    description: The bearer for every /v1/* endpoint + the Web UI login. Generate with `openssl rand -hex 32`.
    group: Secrets
    schema:
      type: string
      required: true
      private: true
  - variable: token_pepper
    label: Operator-token pepper
    description: Hardens minted operator-token hashes (LOOMCYCLE_OPERATOR_TOKEN_PEPPER). Optional but recommended.
    group: Secrets
    schema:
      type: string
      private: true
  - variable: anthropic_api_key
    label: ANTHROPIC_API_KEY
    group: Secrets
    schema:
      type: string
      private: true
  - variable: openai_api_key
    label: OPENAI_API_KEY
    group: Secrets
    schema:
      type: string
      private: true
  - variable: deepseek_api_key
    label: DEEPSEEK_API_KEY
    group: Secrets
    schema:
      type: string
      private: true
  - variable: gemini_api_key
    label: GEMINI_API_KEY
    group: Secrets
    schema:
      type: string
      private: true

  # ── Storage (Postgres) ────────────────────────────────────────────────────
  - variable: pg_dsn
    label: Postgres DSN (LOOMCYCLE_PG_DSN)
    description: 'e.g. postgres://loomcycle:PASSWORD@10.0.0.5:5432/loomcycle?sslmode=disable'
    group: Storage (Postgres)
    schema:
      type: string
      required: true
      private: true
  - variable: sqlmem_pg_dsn
    label: SQL Memory DSN (LOOMCYCLE_SQLMEM_PG_DSN)
    description: Optional — the SQL-Memory aux database (a separate DB / least-privilege role). Required if SQL Memory is enabled.
    group: Storage (Postgres)
    schema:
      type: string
      private: true
  - variable: sqlmem_enabled
    label: Enable SQL Memory
    description: Required by the document-agent bundle. Needs the DSN above.
    group: Storage (Postgres)
    schema:
      type: boolean
      default: false
  - variable: automigrate
    label: Auto-migrate on boot
    description: Apply pending schema migrations on start (LOOMCYCLE_PG_AUTOMIGRATE=1). Simplest for a single operator. Disable to run `loomcycle migrate up` yourself before deploy.
    group: Storage (Postgres)
    schema:
      type: boolean
      default: true

  # ── Runtime Options ───────────────────────────────────────────────────────
  - variable: additional_envs
    label: Additional environment variables
    description: |
      Any other non-secret knob from the env catalogue — see `loomcycle env-template`
      (or the Settings → Presets panel in the Web UI). e.g. LOOMCYCLE_BASH_ENABLED,
      LOOMCYCLE_HTTP_HOST_ALLOWLIST, OLLAMA_BASE_URL.
    group: Runtime Options
    schema:
      type: list
      default: []
      items:
        - variable: env
          label: Environment Variable
          schema:
            type: dict
            attrs:
              - variable: name
                label: Name
                schema:
                  type: string
                  required: true
              - variable: value
                label: Value
                schema:
                  type: string

  # ── Network ───────────────────────────────────────────────────────────────
  - variable: network
    label: ""
    group: Network
    schema:
      type: dict
      attrs:
        - variable: web_port
          label: Web port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port bind mode
                schema:
                  type: string
                  default: published
                  enum:
                    - value: published
                      description: Publish on the host (front with your tunnel/proxy)
                    - value: exposed
                      description: Expose for inter-container access only
                    - value: ""
                      description: None
              - variable: port_number
                label: Port number
                schema:
                  type: int
                  default: 8787
                  min: 1
                  max: 65535
                  required: true

  # ── Storage (Datasets) ────────────────────────────────────────────────────
  # All mapped datasets must be owned by uid:gid 65532:65532 (the distroless user).
  - variable: data
    label: Data storage (LOOMCYCLE_DATA_DIR → /data)
    description: loomcycle's own local state — SQL-Memory cache + snapshots.
    group: Storage (Datasets)
    schema:
      type: dict
      attrs:
        - variable: type
          label: Type
          schema:
            type: string
            required: true
            default: ix_volume
            enum:
              - value: host_path
                description: Host Path (an existing dataset)
              - value: ix_volume
                description: ixVolume (dataset created by the system)
        - variable: ix_volume_config
          label: ixVolume configuration
          schema:
            type: dict
            show_if: [["type", "=", "ix_volume"]]
            $ref:
              - normalize/ix_volume
            attrs:
              - variable: dataset_name
                label: Dataset name
                schema:
                  type: string
                  required: true
                  hidden: true
                  default: data
        - variable: host_path_config
          label: Host path configuration
          schema:
            type: dict
            show_if: [["type", "=", "host_path"]]
            attrs:
              - variable: path
                label: Host path
                schema:
                  type: hostpath
                  required: true

  - variable: config
    label: Config overlay (read-only → /config)
    description: |
      A dataset holding loomcycle.yaml — the thin overlay (your agent `volumes:`
      block). Copy deploy/truenas/loomcycle.overlay.example.yaml into it.
    group: Storage (Datasets)
    schema:
      type: dict
      attrs:
        - variable: type
          label: Type
          schema:
            type: string
            required: true
            default: host_path
            enum:
              - value: host_path
                description: Host Path (an existing dataset)
              - value: ix_volume
                description: ixVolume (dataset created by the system)
        - variable: ix_volume_config
          label: ixVolume configuration
          schema:
            type: dict
            show_if: [["type", "=", "ix_volume"]]
            $ref:
              - normalize/ix_volume
            attrs:
              - variable: dataset_name
                label: Dataset name
                schema:
                  type: string
                  required: true
                  hidden: true
                  default: config
        - variable: host_path_config
          label: Host path configuration
          schema:
            type: dict
            show_if: [["type", "=", "host_path"]]
            attrs:
              - variable: path
                label: Host path
                schema:
                  type: hostpath
                  required: true

  - variable: additional_storage
    label: Agent Volumes (RFC AH)
    description: |
      ZFS datasets agents may read/write, each mounted at an in-container path that
      your config overlay's `volumes:` block maps a name to (e.g. mount_path
      /mnt/work ↔ overlay `work: { path: /mnt/work }`).
    group: Storage (Datasets)
    schema:
      type: list
      default: []
      items:
        - variable: store
          label: Volume
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  required: true
                  default: host_path
                  enum:
                    - value: host_path
                      description: Host Path (an existing dataset)
                    - value: ix_volume
                      description: ixVolume (dataset created by the system)
              - variable: read_only
                label: Read-only
                schema:
                  type: boolean
                  default: false
              - variable: mount_path
                label: Mount path (in container)
                description: Must match the `path` of a `volumes:` entry in your overlay.
                schema:
                  type: path
                  required: true
              - variable: host_path_config
                label: Host path configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host path
                      schema:
                        type: hostpath
                        required: true
              - variable: ix_volume_config
                label: ixVolume configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: dataset_name
                      label: Dataset name
                      schema:
                        type: string
                        required: true

  # >>> generated by `loomcycle truenas-questions` — regenerate on .env.insecure.example change >>>
  - variable: env_options
    label: Advanced environment options
    group: Advanced configuration
    description: Any other non-secret knob from the loomcycle env catalogue (.env.insecure.example). Leave a field blank to use the binary's built-in default; each field's help shows the example value.
    schema:
      type: dict
      default: ""
      attrs:
          - variable: OLLAMA_BASE_URL
            label: OLLAMA_BASE_URL
            description: '`ollama` provider       = hosted ollama.com, Bearer auth via OLLAMA_API_KEY. `ollama-local` provider = local-network Ollama, no auth, default http://localhost:11434. Driven by OLLAMA_BASE_URL. Existing deploys with OLLAMA_BASE_URL=http://localhost:11434 keep working unchanged — they now feed `ollama-local`. To opt out of the local registration entirely, set OLLAMA_BASE_URL=disabled. (example: h…'
            schema:
              type: string
              default: ""
          - variable: OLLAMA_CLOUD_BASE_URL
            label: OLLAMA_CLOUD_BASE_URL
            description: '(example: https://ollama.com)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_OLLAMA_LOCAL_NUM_CTX
            label: LOOMCYCLE_OLLAMA_LOCAL_NUM_CTX
            description: 'num_ctx pins the input window Ollama runs every request in. Set it: without an explicit num_ctx Ollama silently truncates the prompt at its 4096-token default. It also doubles as the context window the interactive terminal''s gauge reports (used/max/%) — unset, the gauge can only show the absolute used size (the per-model window isn''t knowable from the driver). (example: 32768)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_OLLAMA_NUM_CTX
            label: LOOMCYCLE_OLLAMA_NUM_CTX
            description: '(example: 32768)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_HTTP_HOST_ALLOWLIST
            label: LOOMCYCLE_HTTP_HOST_ALLOWLIST
            description: HTTP + WebFetch tools — comma-separated suffix-match host allowlist. Entry "example.com" matches "example.com" and "api.example.com" but not "evilexample.com". Private IPs (RFC1918, loopback, link-local incl. 169.254.169.254) are HARD-blocked at connect regardless of allowlist. Loopback aliases on the list (localhost, 127.0.0.1, ::1, *.localhost) are silently stripped at startup — use LOOMCYC…
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_HTTP_PRIVATE_HOST_ALLOWLIST
            label: LOOMCYCLE_HTTP_PRIVATE_HOST_ALLOWLIST
            description: 'Private-host exception. Hosts here may resolve to private IPs at dial time — used to permit agent callbacks to a localhost-bound application API. Suffix-matched the same way as the main allowlist. Each entry must ALSO be on LOOMCYCLE_HTTP_HOST_ALLOWLIST (or be carried per-call when LOOMCYCLE_HTTP_CALLER_AUTHORITATIVE=1) to be reachable; this var only lifts the IP-private rejection. (example: lo…'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_HTTP_CALLER_AUTHORITATIVE
            label: LOOMCYCLE_HTTP_CALLER_AUTHORITATIVE
            description: 'Caller-authoritative mode for HTTP/WebFetch host allowlist. When unset (default): caller''s per-request allowed_hosts can ONLY narrow the operator''s static list. Trust model: operator owns the host policy; caller fine-tunes per-call. When =1: caller''s allowed_hosts is the SOLE policy. Operator''s static list becomes a fallback for runs that don''t carry their own list. Trust model: caller (the appli…'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_BASH_ENABLED
            label: LOOMCYCLE_BASH_ENABLED
            description: 'Bash tool — explicitly opt-in. NOT a true sandbox: cwd-restricted, env-scrubbed (only PATH leaks), output-bounded (1 MiB), time-capped (30s default, 5min max). Run loomcycle inside a container if you expose Bash to untrusted prompts. Bash requires a rw `volumes:` binding (it runs in the bound volume''s root) — see the volumes note above. (example: 1)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_BASHBOX_ENABLED
            label: LOOMCYCLE_BASHBOX_ENABLED
            description: 'An alternative to Bash: a real sandbox (the pure-Go `gbash` engine) that spawns NO OS process, roots every path at the agent''s mounted volume, and has NO network. Unlike Bash it HONORS read-only volumes (writes hit an in-RAM overlay, never the host). Opt-in, then grant per agent via `allowed_tools: [Bashbox]`. gbash is alpha — the per-agent gate is the escape hatch. Defaults OFF. (example: 1)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_BASHBOX_FALLBACK_COMMANDS
            label: LOOMCYCLE_BASHBOX_FALLBACK_COMMANDS
            description: 'Host-command fallback (RFC AJ §13): an operator allowlist of commands gbash does NOT implement (e.g. git, gh) that may ESCAPE the sandbox to the real host shell. Empty (default) = no fallback; every command stays sandboxed. Only these names reach the host; requires a rw volume. Comma-separated. (example: git,gh)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_BASHBOX_FALLBACK_ALLOWED_ENV
            label: LOOMCYCLE_BASHBOX_FALLBACK_ALLOWED_ENV
            description: 'Env vars injected ONLY into fallback (host) commands — never the sandbox (PATH always passes). Reference NAMES here; the secret VALUES live in .env.local. Comma-separated. (example: GH_TOKEN,HOME,SSH_AUTH_SOCK)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SKILLS_ROOT
            label: LOOMCYCLE_SKILLS_ROOT
            description: 'Skill bodies count as operator-authored content and are trusted — they''re loaded with the same trust as inline `system_prompt:`. Do not point this at a directory writable by untrusted users. (example: /srv/loomcycle/skills)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_AGENTS_ROOT
            label: LOOMCYCLE_AGENTS_ROOT
            description: '(example: /srv/loomcycle/agents)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_HELP_ROOT
            label: LOOMCYCLE_HELP_ROOT
            description: '(example: /srv/loomcycle/help)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_MEMORY_MAX_VALUE_BYTES
            label: LOOMCYCLE_MEMORY_MAX_VALUE_BYTES
            description: 'Per-write cap on the value payload (set / incr). Default 64 KB (65536). 0 disables. Refuses obvious abuse like "stash an entire transcript in one row". (example: 65536)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_MEMORY_MAX_SCOPE_BYTES
            label: LOOMCYCLE_MEMORY_MAX_SCOPE_BYTES
            description: 'Default per-(scope, scope_id) byte cap. Default 1 MB (1048576). 0 disables. Per-agent yaml memory_quota_bytes overrides this. (example: 1048576)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_MEMORY_SWEEP_MS
            label: LOOMCYCLE_MEMORY_SWEEP_MS
            description: 'TTL reaper goroutine cadence — periodic DELETE of expired rows. Default 15 minutes. 0 disables (operators with an external reaper, or dev/test runs that don''t want background work, can opt out). Read paths filter expired entries even when the reaper is off, so agents never see stale values regardless. (example: 900000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_ENABLED
            label: LOOMCYCLE_SQLMEM_ENABLED
            description: 'A per-scope SQL database the runtime hosts as a third Memory facet (agents query arbitrary SQL via the Memory tool''s sql_* ops). It also BACKS the Document primitive (RFC AK) — the chunk-structure tables live here, so **Documents and the Web UI Document viewer/assistant require this enabled.** Default OFF. (example: 1)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_ROOT
            label: LOOMCYCLE_SQLMEM_ROOT
            description: 'Where the per-scope sqlite files live (default <DataDir>/sqlmem). Postgres tier: set the DSN in .env.local (LOOMCYCLE_SQLMEM_PG_DSN — it carries a password, so it is a SECRET, not config). (example: ./data/sqlmem)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_MAX_ROWS
            label: LOOMCYCLE_SQLMEM_MAX_ROWS
            description: 'Guardrails (defense-in-depth; the Go statement validator blocks ATTACH/PRAGMA/load_extension regardless): (example: 10000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_STATEMENT_TIMEOUT_MS
            label: LOOMCYCLE_SQLMEM_STATEMENT_TIMEOUT_MS
            description: '(example: 5000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_TXN_TIMEOUT_MS
            label: LOOMCYCLE_SQLMEM_TXN_TIMEOUT_MS
            description: '(example: 30000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_MAX_OPEN_TXNS
            label: LOOMCYCLE_SQLMEM_MAX_OPEN_TXNS
            description: '(example: 64)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_MAX_TXN_DEPTH
            label: LOOMCYCLE_SQLMEM_MAX_TXN_DEPTH
            description: '(example: 8)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_QUOTA_BYTES
            label: LOOMCYCLE_SQLMEM_QUOTA_BYTES
            description: '(example: 52428800)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_TOTAL_MAX_BYTES
            label: LOOMCYCLE_SQLMEM_TOTAL_MAX_BYTES
            description: '(example: 0)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_SNAPSHOT_MAX_SCOPE_BYTES
            label: LOOMCYCLE_SQLMEM_SNAPSHOT_MAX_SCOPE_BYTES
            description: '(example: 0)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_GC_INTERVAL_MS
            label: LOOMCYCLE_SQLMEM_GC_INTERVAL_MS
            description: '(example: 900000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_SCOPE_TTL_MS
            label: LOOMCYCLE_SQLMEM_SCOPE_TTL_MS
            description: '(example: 0)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_AUDIT_MODE
            label: LOOMCYCLE_SQLMEM_AUDIT_MODE
            description: '(example: 0)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLMEM_SHARED_SCHEMAS
            label: LOOMCYCLE_SQLMEM_SHARED_SCHEMAS
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_PGVECTOR_ENABLED
            label: LOOMCYCLE_PGVECTOR_ENABLED
            description: 'Memory op=recall does embedding-based semantic search. sqlite tier uses sqlite-vec; postgres tier uses pgvector. The embedder API key (if a hosted embedder) is a SECRET → .env.local. (example: 1)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_SQLITE_VEC_PATH
            label: LOOMCYCLE_SQLITE_VEC_PATH
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_MEMORY_EMBED_BATCH_SIZE
            label: LOOMCYCLE_MEMORY_EMBED_BATCH_SIZE
            description: '(example: 64)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_MEMORY_EMBED_TIMEOUT_MS
            label: LOOMCYCLE_MEMORY_EMBED_TIMEOUT_MS
            description: '(example: 30000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_PROVIDER_HEADER_TIMEOUT_MS
            label: LOOMCYCLE_PROVIDER_HEADER_TIMEOUT_MS
            description: 'Operators on networks with high TLS handshake latency or aggressive NAT idle timeouts may want to bump HEADER_TIMEOUT to 90 000 ms; the defaults are tuned for direct internet egress. (example: 60000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_PROVIDER_IDLE_TIMEOUT_MS
            label: LOOMCYCLE_PROVIDER_IDLE_TIMEOUT_MS
            description: '(example: 90000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_OLLAMA_LOCAL_HEADER_TIMEOUT_MS
            label: LOOMCYCLE_OLLAMA_LOCAL_HEADER_TIMEOUT_MS
            description: 'The `ollama-local` provider is the exception: local generation is slow on first-token (cold model load from disk + prompt eval over a large num_ctx can take minutes on a consumer GPU/CPU), so it uses its OWN, more generous default pair — 300 s / 300 s — instead of the cloud-shaped 60/90 above. These override only ollama-local; hosted ollama.com and every other cloud provider keep the global P…'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_OLLAMA_LOCAL_IDLE_TIMEOUT_MS
            label: LOOMCYCLE_OLLAMA_LOCAL_IDLE_TIMEOUT_MS
            description: '(example: 300000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_FALLBACK_PIN_AFTER_SUCCESS
            label: LOOMCYCLE_FALLBACK_PIN_AFTER_SUCCESS
            description: 'Default OFF in v0.8.x; default-on planned for v0.9.x once production-validated. Recommended for any deployment running runs with thinking-mode providers (DeepSeek reasoner family, gemini-2.5-flash with effort hint). (example: 1)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_METRICS_ENABLED
            label: LOOMCYCLE_METRICS_ENABLED
            description: 'Default OFF in v0.8.x — set =1 to enable. Default-on planned for v0.9.x once production-validated. (example: 1)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_METRICS_SAMPLE_INTERVAL_MS
            label: LOOMCYCLE_METRICS_SAMPLE_INTERVAL_MS
            description: 'Sample cadence in milliseconds. Default 5 s (5000). Values below 1 s are clamped up to 1 s — prevents accidental write-storms from a typo''d 50 vs 5000. Storage estimate at defaults: ~210 MB/week for a continuously-active deployment (5 s × 86 400 × 7 ≈ 121 K rows × ~250 bytes each). (example: 5000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_METRICS_RETENTION_DAYS
            label: LOOMCYCLE_METRICS_RETENTION_DAYS
            description: 'Retention in days. Default 7. Set 0 to disable automatic cleanup (table grows unbounded). Lower this on slow disks or storage-constrained deployments. (example: 7)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_METRICS_COLLECT_SYSTEM
            label: LOOMCYCLE_METRICS_COLLECT_SYSTEM
            description: 'Optional: also read /proc/stat + /proc/meminfo for SYSTEM-wide CPU% + memory (not just loomcycle''s process). Linux only; silently ignored on macOS/Windows. Useful when correlating loomcycle''s behaviour with host pressure (e.g. ZFS ARC eating RAM in a TrueNAS-hosted VM). (example: 1)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_METRICS_SWEEP_INTERVAL_MS
            label: LOOMCYCLE_METRICS_SWEEP_INTERVAL_MS
            description: 'Sweeper cadence (cleanup goroutine) in milliseconds. Default 15 min. Set 0 to disable. Bounded retention requires BOTH a non-zero retention AND non-zero sweep interval. (example: 900000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_MCP_ALLOW_PRIVILEGED_TOOLS
            label: LOOMCYCLE_MCP_ALLOW_PRIVILEGED_TOOLS
            description: 'IMPORTANT: only flip on when the MCP client itself is trusted (operator-launched stdio = trusted; remote HTTP MCP would not be). (example: 1)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_MCP_ALLOW_DYNAMIC_STDIO
            label: LOOMCYCLE_MCP_ALLOW_DYNAMIC_STDIO
            description: By default the MCPServerDef substrate (POST /v1/_mcpserverdef) may register only http / streamable-http servers; a `stdio` server runs an ARBITRARY LOCAL COMMAND, so dynamic stdio registration is off by default (a second local-exec path alongside the Bash tool). Set this to 1 to let operators register stdio MCP servers at runtime with command/args/env. Static yaml `mcp_servers:` stdio entries are…
