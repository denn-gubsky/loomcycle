              type: string
              default: ""
          - variable: LOOMCYCLE_REDACT_SECRETS
            label: LOOMCYCLE_REDACT_SECRETS
            description: 'F32 — secret redaction at rest. ON BY DEFAULT: tool I/O (tool_call inputs + tool_result outputs) is scanned for secret-shaped substrings and masked BEFORE it is persisted to the events store (and thus to snapshots + the /v1/_events audit API), so a token inlined on a Bash cmdline or echoed by a tool isn''t written to disk in cleartext. The live SSE stream is NOT redacted (the caller already hold…'
