            description: 'Cadence for the dynamic_agents TTL sweeper, in milliseconds. Default 15 min (900000). Set 0 to disable the sweeper — expired rows linger in the table but DynamicAgentGet still filters them at read time, so functional correctness is preserved (only storage reclamation is forgone). Disabling makes sense at low registration volume where the table never grows enough to matter. (example: 900000)'
            schema:
              type: string
              default: ""
          - variable: LOOMCYCLE_PAUSE_DEFAULT_TIMEOUT_MS
            label: LOOMCYCLE_PAUSE_DEFAULT_TIMEOUT_MS
