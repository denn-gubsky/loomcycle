# test/load/circuit-stress — loomcycle config for the multi-agent
# circuit load test. See README.md for what this test exercises.
#
# Single provider: anthropic-oauth-dev (Claude MAX subscription).
# Ollama Cloud was tried as fallback but its per-deployment
# concurrency limit kept tripping at ~120 simultaneous runs,
# adding a SECOND failure source rather than absorbing the first.
# Simpler tier (Anthropic only) + low concurrency cap = clean test
# of the substrate without provider-side variability.

provider_priority:
  - anthropic-oauth-dev

# Library-default tier — used by every agent here unless overridden.
# Pinned to haiku because the goal is exercising the substrate, not
# generating reasoning tokens; cheaper + faster keeps the OAuth-dev
# MAX subscription budget alive for higher scales.
tiers:
  middle:
    - { provider: anthropic-oauth-dev, model: claude-haiku-4-5-20251001 }

# Default user_tier — every run inherits unless POST /v1/runs sets
# its own. fallback_on_error: false because the only candidate is
# anthropic-oauth-dev; with no fallback target, the flag would just
# determine whether retryable errors are swallowed or propagated
# (we want propagation for visibility during load testing).
user_tiers:
  default:
    provider_priority: [anthropic-oauth-dev]
    tiers:
      middle:
        - { provider: anthropic-oauth-dev, model: claude-haiku-4-5-20251001 }
    fallback_on_error: false

# Concurrency — 20 active. Empirical: a day of heavy load testing
# on 2026-05-26 burned through Anthropic OAuth-dev MAX's per-minute
# request budget; at 100 concurrent the account stays in a backoff
# window and every request 429s. 20 leaves clear headroom under
# the per-minute rate limit on a tired account.
#
# This is intentionally conservative for sustainable iteration —
# tests can run back-to-back without exhausting the rate limiter.
# If a fresh account has more headroom, bump this back up to 100.
#
# Queue depth 1500 (75× active) so x1000 can fully queue without
# the 1500th circuit refusing at the admission boundary.
# Timeout 5 min — at 20 active and ~25s per circuit, the 1000th
# circuit waits ~20 min in queue; bump queue_timeout_ms to 1800000
# (30 min) for full-x1000 runs at this concurrency.
concurrency:
  max_concurrent_runs: 20
  max_queue_depth: 1500
  queue_timeout_ms: 300000
  max_concurrent_runs_per_user: 0

# Storage — Postgres only. SQLite would serialise writes at this
# scale and dominate the latency picture before the substrate
# itself is meaningfully under load.
storage:
  backend: postgres
  pg_dsn: ${LOOMCYCLE_PG_DSN}
  pg_max_open_conns: 64
  pg_max_idle_conns: 8

# ─── Channels ──────────────────────────────────────────────────────
# Channels are GENERATED into this file by run.sh before each test:
# `--scale N` produces N pairs of `research-done/cK` + `editing-done/cK`
# entries inserted below this marker.
#
# Why yaml-time generation instead of POST /v1/_channels CRUD at
# runtime? The runtime Channel CRUD validator rejects names with `/`
# (regex `[A-Za-z0-9_-]{1,128}`), but the yaml validator accepts them.
# We need slashes because the agent-channel ACL wildcard syntax is
# `prefix/*` — without slashes there's no compact way to grant access
# to "all N per-circuit channels" without enumerating each one in
# every agent's ACL. So we let yaml own the channel declarations and
# use the `*` wildcard in agents.
#
# The generator block below (between BEGIN and END markers) is
# managed by run.sh — do not edit by hand; edit run.sh's generator
# if the channel shape needs to change.

channels:
  # ── BEGIN generated channels ── (managed by run.sh)
  # ── END generated channels ──

# ─── Agents ────────────────────────────────────────────────────────
# Three brevity-tuned agents. Prompts are TIGHT — the goal is to
# exercise the substrate, not generate useful content. Each agent
# does exactly its three tool calls and stops. No chain-of-thought
# narration, no markdown headers, no preamble.
#
# Note on prompt wiring: each agent gets its `user_id` from the run
# identity via Context.self if it needs it (Memory.set with
# scope=user picks user_id up automatically; Channel names are
# constructed by the driver and passed in segments).

agents:

  researcher:
    tier: middle
    max_tokens: 1500
    system_prompt: |
      You are a researcher in a load-test pipeline. The user input
      tells you (a) a circuit_id like "c42", and (b) a tiny factual
      question. Do this exactly:

        1. Answer the question in 1-2 short sentences from your own
           knowledge. No preamble, no markdown, no citations.
        2. Call Memory.set with: scope="user", key="c{N}-research",
           value=<your answer> (substitute the circuit_id you were
           given, e.g. c42-research).
        3. Call Channel.publish with: channel="research-done/c{N}",
           message={"circuit_id":"c{N}"} (same circuit_id).
        4. Stop. Do not narrate. Do not summarise what you did.
    allowed_tools: [Memory, Channel, Context]
    memory_scopes: [user]
    channels:
      publish: ["research-done/*"]
      subscribe: []

  editor:
    tier: middle
    max_tokens: 1500
    system_prompt: |
      You are an editor in a load-test pipeline. The user input
      tells you a circuit_id like "c42".

      ⚠ HOW THIS LOOP WORKS: you will be invoked many times in this
      single run. Each turn you emit ONE tool call and brief text.
      Loomcycle returns the tool_result to you automatically; you do
      NOT need to ask the user to provide it, and you do NOT need to
      announce that you're "waiting". When you see a tool_result in
      your context, that means it's the NEXT turn — proceed
      immediately to the next step. You only stop emitting tool calls
      when all 4 steps below are done.

      ⚠ EXACTLY ONE tool call per turn. Do NOT emit step N+1 in the
      same turn as step N — this pipeline depends on each step's
      result before the next can start. Multiple tool calls in one
      turn run in parallel and break the sequencing.

      The 4 steps (one tool call per turn):

        1. Call Channel.subscribe with channel="research-done/c{N}",
           wait_ms=120000, max_messages=1, auto_ack=true.
           The result will appear in your next turn — when it does,
           proceed immediately to step 2.

        2. Call Memory.get with scope="user", key="c{N}-research".
           When the value comes back, proceed immediately to step 3.

        3. Tighten the research to at most 25 words (cut filler,
           sharper verbs, stay faithful). Call Memory.set with
           scope="user", key="c{N}-research-edited", value=<tightened>.
           When the ack comes back, proceed immediately to step 4.

        4. Call Channel.publish with channel="editing-done/c{N}",
           message={"circuit_id":"c{N}","editor_run_id":<your run_id
           from Context.self>}. If you don't have your run_id yet,
           use Context.self in this turn FIRST, then publish in the
           turn after. After the publish ack, you're done — stop.

      Do NOT say "waiting for next step" or "ready for instructions"
      or anything similar — those phrases end the run prematurely.
      Do NOT narrate progress. Just emit the next tool call.
    allowed_tools: [Memory, Channel, Context]
    memory_scopes: [user]
    channels:
      publish: ["editing-done/*"]
      subscribe: ["research-done/*"]

  evaluator:
    tier: middle
    max_tokens: 1500
    system_prompt: |
      You are an evaluator in a load-test pipeline. The user input
      tells you a circuit_id like "c42".

      ⚠ HOW THIS LOOP WORKS: you will be invoked many times in this
      single run. Each turn you emit ONE tool call and brief text.
      Loomcycle returns the tool_result to you automatically; you do
      NOT need to ask the user to provide it, and you do NOT need to
      announce that you're "waiting". When you see a tool_result in
      your context, that means it's the NEXT turn — proceed
      immediately to the next step. You only stop emitting tool calls
      when all 5 steps below are done.

      ⚠ EXACTLY ONE tool call per turn. Do NOT emit step N+1 in the
      same turn as step N. This pipeline depends on the editor
      finishing BEFORE you read memory — reading the memory keys
      before the channel signal arrives will return null because
      the editor hasn't written them yet.

      The 5 steps (one tool call per turn):

        1. Call Channel.subscribe with channel="editing-done/c{N}",
           wait_ms=120000, max_messages=1, auto_ack=true.
           The result will appear in your next turn — when it does,
           extract "editor_run_id" from the message body (remember
           it for step 5) and proceed to step 2.

        2. Call Memory.get with scope="user", key="c{N}-research".
           When the value comes back, proceed to step 3.

        3. Call Memory.get with scope="user", key="c{N}-research-edited".
           When the value comes back, proceed to step 4.

        4. Score the edit 0.0-1.0 on (a) tightness (≤25 words?) and
           (b) faithfulness (same meaning?). Call Memory.set with
           scope="user", key="c{N}-research-scored",
           value={"score":<float>,"rationale":<one short sentence>}.
           When the ack comes back, proceed to step 5.

        5. Call Evaluation.submit with run_id=<editor_run_id from
           step 1's message>, score=<float>,
           rationale=<your sentence>. After the ack you're done — stop.

      Do NOT say "waiting for next step" or "ready for instructions"
      or anything similar — those phrases end the run prematurely.
      Do NOT narrate progress. Just emit the next tool call.
    allowed_tools: [Memory, Channel, Evaluation, Context]
    memory_scopes: [user]
    # submit_any is needed because the evaluator is a SIBLING of the
    # editor (different agent, no parent/child relationship). The
    # checkSubmitScope code path collapses sibling → "unrelated" today
    # (see evaluation.go:319 — submit_siblings is reserved but inert
    # until v0.9.x plumbs ParentAgentID through RunIdentity); only
    # submit_any permits the "unrelated" emitter role.
    evaluation_scopes: [submit_any]
    channels:
      publish: []
      subscribe: ["editing-done/*"]
