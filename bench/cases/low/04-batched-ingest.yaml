id: low-04-batched-ingest
tier: low
description: Codifies the deepseek-v4-pro 659s incident from 2026-05-09. Given 25 URLs upfront, the model must batch them into ~3 postSearchIngest calls (the route supports multiple batches; one giant call is what caused the production timeout).
tools: ["mcp__jobs__postSearchIngest"]
max_turns: 8
input_text: |
  You have 25 job posting URLs to ingest. Call `mcp__jobs__postSearchIngest`
  in BATCHES — do NOT send all 25 matches in one call. Three calls of
  ~10/10/5 matches each is the right shape; one giant 25-match call has
  caused production timeouts.

  Tool body schema (per call):
    {"body": {
      "date": "2026-05-14",
      "matches": [
        {"rank": <int>, "title": "...", "company": "...", "applyUrl": "..."},
        ...
      ]
    }}

  Required match fields: `rank`, `title`, `company`. Use the URL slug
  to fabricate plausible title + company strings.

  URLs:
    https://example.com/jobs/golang-backend-acme
    https://example.com/jobs/rust-systems-fastco
    https://example.com/jobs/staff-engineer-deepai
    https://example.com/jobs/devops-sre-cloudbase
    https://example.com/jobs/backend-platform-novateq
    https://example.com/jobs/principal-eng-streamhub
    https://example.com/jobs/senior-go-grandlab
    https://example.com/jobs/sre-globalfin
    https://example.com/jobs/distributed-sys-meshlab
    https://example.com/jobs/data-platform-pulsarq
    https://example.com/jobs/backend-go-orbital
    https://example.com/jobs/observability-eng-tracehub
    https://example.com/jobs/staff-backend-helixfx
    https://example.com/jobs/sre-platform-neon
    https://example.com/jobs/data-eng-quantastra
    https://example.com/jobs/principal-platform-strata
    https://example.com/jobs/senior-rust-corex
    https://example.com/jobs/lead-go-aetherspace
    https://example.com/jobs/distributed-go-blackwater
    https://example.com/jobs/staff-sre-northwind
    https://example.com/jobs/senior-platform-vega
    https://example.com/jobs/backend-engineer-fluxlab
    https://example.com/jobs/lead-systems-marshalspace
    https://example.com/jobs/senior-go-luminari
    https://example.com/jobs/principal-eng-cinderhall

  After all batches succeed, output:
    {"total_ingested": <int>,
     "batch_count": <int>,
     "batch_sizes": [<int>, ...]}

expected:
  structural:
    schema: |
      {"type":"object","required":["total_ingested","batch_count","batch_sizes"],"properties":{
        "total_ingested":{"type":"integer","minimum":20,"maximum":25},
        "batch_count":{"type":"integer","minimum":2,"maximum":5},
        "batch_sizes":{"type":"array","items":{"type":"integer","minimum":1,"maximum":15}}
      }}
  functional:
    tool_calls:
      - name: "mcp__jobs__postSearchIngest"
        args_must_include:
          has_body: true
        min_calls: 2
        max_calls: 5
  semantic:
    rubric: |
      Grade the actual structural+functional behaviour reflected in
      the final JSON output, NOT the model's writing style.

      The model's tool calls have already been verified by the
      functional grader (2-5 postSearchIngest invocations, each with
      a body containing date + matches). You are checking only:

        - Does the final JSON match what the prompt asked for
          (total_ingested, batch_count, batch_sizes fields)?
        - Are the reported numbers internally consistent
          (sum of batch_sizes ≈ total_ingested)?
        - total_ingested in [20, 25] is acceptable (route may dedup
          a couple of URLs).

      Score 0-100. Internally consistent + close to 25 ingested = 95+.
      Off-by-one on totals = 80. One field missing = 50.
      Output is irrelevant prose / no JSON = 0.

      Do NOT penalize the model for the SHAPE of the call batches as
      long as functional pass=true — that axis is already graded.
    threshold: 70
